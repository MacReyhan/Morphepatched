name: Compile My Custom Morphe YouTube

on:
  workflow_dispatch:

jobs:
  build-youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (OpenJDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Fetch Target, Scrape and Compile YouTube
        run: |
          mkdir -p output_apk

          echo "📥 Fetching live patch matrix from official Morphe source..."
          curl -s "https://raw.githubusercontent.com/MorpheApp/morphe-patches/main/patches-list.json" > patches.json

          echo "🔍 Parsing exact recommended stable version for YouTube..."
          # Secure extraction targeting the nested compatiblePackages blocks, safely ignoring null/empty entries
          TARGET_VERSION=$(jq -r '.patches[]? | select(.compatiblePackages != null) | .compatiblePackages[]? | select(.packageName == "com.google.android.youtube") | .targets[]? | select(.isExperimental == false) | .version' patches.json | tail -n 1)

          if [ -z "$TARGET_VERSION" ] || [ "$TARGET_VERSION" == "null" ]; then
            echo "❌ Error: Could not parse stable YouTube version. Aborting."
            exit 1
          fi

          echo "🎯 Recommended YouTube Target Version found: $TARGET_VERSION"

          echo "🚀 Scraping APKMirror for clean arm64-v8a layout using Node execution..."
          # Swapped 'apkmd' out for 'npx apkmirror-downloader' to completely bypass the bash syntax error bug
          npx apkmirror-downloader --org google-inc --repo youtube --version "$TARGET_VERSION" --arch arm64-v8a --dpi nodpi --outDir . --outFile clean_youtube.apk

          if [ -f "clean_youtube.apk" ]; then
            echo "🔨 Compiling with official local Morphe CLI framework..."
            npx @morpheapp/cli patch --apk clean_youtube.apk --output output_apk/Morphe-YouTube-Targeted.apk
            echo "✅ Morphe patch successfully injected!"
          else
            echo "❌ Fatal Error: Base YouTube binary download failed."
            exit 1
          fi

      - name: Upload Audited Pristine APK
        uses: actions/upload-artifact@v4
        with:
          name: Clean-Morphe-YouTube
          path: output_apk/Morphe-YouTube-Targeted.apk
          retention-days: 3
