name: Compile My Custom Morphe YouTube

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (OpenJDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python (for APKMirror scraper)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Target, Scrape and Compile YouTube
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p output_apk workdir
          cd workdir

          # ----------------------------------------------------------------
          # 1. Determine the recommended stable YouTube version.
          # Mirrors Morphe Manager's picker
          # (morphe-manager HomeViewModel.kt `recommendedVersionsFlow`):
          # for the target package, take the highest non-experimental
          # version. `sort -V` is version-aware, unlike alphabetical `tail`.
          # `(.isExperimental // false) == false` treats missing flags as
          # non-experimental — same as PatchInfo.kt semantics.
          # ----------------------------------------------------------------
          echo "📥 Fetching live patch matrix from official Morphe source..."
          curl -fsSL \
            "https://raw.githubusercontent.com/MorpheApp/morphe-patches/main/patches-list.json" \
            -o patches.json

          PATCHES_VERSION=$(jq -r '.version' patches.json)
          echo "📦 patches-list.json reports patch bundle version: $PATCHES_VERSION"

          TARGET_VERSION=$(jq -r '
            .patches[]?
            | select(.compatiblePackages != null)
            | .compatiblePackages[]?
            | select(.packageName == "com.google.android.youtube")
            | .targets[]?
            | select((.isExperimental // false) == false)
            | .version
          ' patches.json | sort -V | tail -n 1)

          if [ -z "$TARGET_VERSION" ] || [ "$TARGET_VERSION" = "null" ]; then
            echo "❌ Error: could not parse stable YouTube version. Aborting."
            exit 1
          fi
          echo "🎯 Recommended YouTube target: $TARGET_VERSION"

          # ----------------------------------------------------------------
          # 2. Download the matching patches .mpp from morphe-patches release.
          # ----------------------------------------------------------------
          echo "📦 Downloading patches-${PATCHES_VERSION}.mpp..."
          curl -fsSL -o patches.mpp \
            "https://github.com/MorpheApp/morphe-patches/releases/download/v${PATCHES_VERSION}/patches-${PATCHES_VERSION}.mpp"

          # ----------------------------------------------------------------
          # 3. Download the latest morphe-cli jar from its GitHub release.
          # ----------------------------------------------------------------
          echo "📦 Resolving latest morphe-cli release..."
          CLI_JSON=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest")
          CLI_TAG=$(echo "$CLI_JSON" | jq -r '.tag_name')
          CLI_ASSET_URL=$(echo "$CLI_JSON" \
            | jq -r '.assets[] | select(.name | endswith("-all.jar")) | .browser_download_url')

          if [ -z "$CLI_ASSET_URL" ] || [ "$CLI_ASSET_URL" = "null" ]; then
            echo "❌ Error: could not locate morphe-cli *-all.jar in release $CLI_TAG."
            exit 1
          fi
          echo "📦 Downloading $CLI_TAG jar..."
          curl -fsSL -o morphe-cli.jar "$CLI_ASSET_URL"
          ls -lh morphe-cli.jar patches.mpp

          # ----------------------------------------------------------------
          # 4. Scrape the clean YouTube APK from APKMirror.
          # APKMirror is gated by Cloudflare's JS challenge, which a plain
          # HTTP client (cheerio/requests) cannot pass. We use curl_cffi with
          # firefox133 TLS impersonation, which bypasses the challenge.
          # Strategy adapted from RookieEnough/Morphe-AutoBuilds.
          # ----------------------------------------------------------------
          echo "📦 Installing python deps (curl-cffi, beautifulsoup4)..."
          pip install --quiet curl-cffi beautifulsoup4

          echo "🚀 Scraping APKMirror..."
          python3 ../scripts/download_apk.py \
            google-inc youtube "$TARGET_VERSION" arm64-v8a nodpi \
            clean_youtube.apk

          if [ ! -f "clean_youtube.apk" ]; then
            echo "❌ Fatal: clean_youtube.apk not produced."
            exit 1
          fi

          # ----------------------------------------------------------------
          # 5. Patch with morphe-cli.
          # ----------------------------------------------------------------
          echo "🔨 Patching with morphe-cli $CLI_TAG..."
          java -jar morphe-cli.jar patch \
            --patches patches.mpp \
            clean_youtube.apk

          if [ ! -f "clean_youtube.apk.patched.apk" ]; then
            echo "❌ Fatal: morphe-cli did not produce a patched APK."
            echo "   Listing workdir:"
            ls -la
            exit 1
          fi
          mv clean_youtube.apk.patched.apk ../output_apk/Morphe-YouTube-Targeted.apk
          echo "✅ Patch succeeded."

      - name: Upload Patched APK
        uses: actions/upload-artifact@v4
        with:
          name: Morphe-YouTube-Patched
          path: output_apk/Morphe-YouTube-Targeted.apk
          if-no-files-found: error
          retention-days: 3
